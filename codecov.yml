# Codecov configuration
# See CONTRIBUTING.md for coverage targets and known untestable paths.

coverage:
  status:
    project:
      default:
        target: 75%
        threshold: 2%
    patch:
      default:
        target: 70%

# Exclusions — generated code and non-testable packages.
# Each exclusion is documented here and in CONTRIBUTING.md.
ignore:
  # Auto-generated by controller-gen (deepcopy methods) — changes on every `just generate`
  - "api/v1alpha1/zz_generated.deepcopy.go"
  # main() entrypoint — wiring only, tested via E2E
  - "cmd/**"
  # Test utilities — not test targets
  - "test/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
