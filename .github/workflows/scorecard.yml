name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:30 UTC (offset from security.yml to avoid congestion)
    - cron: "30 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Use SCORECARD_TOKEN (PAT with public_repo scope) for publishing results to
          # the OpenSSF API. Falls back to GITHUB_TOKEN for analysis-only mode.
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}
          publish_results: ${{ secrets.SCORECARD_TOKEN != '' }}

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
