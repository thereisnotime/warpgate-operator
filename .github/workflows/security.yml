name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gosec:
    name: Go Security (gosec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

      - name: Run gosec
        run: gosec -fmt sarif -out gosec.sarif -exclude-dir=test ./...

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
        if: always()
        with:
          sarif_file: gosec.sarif
          category: gosec

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: |
          govulncheck ./... 2>&1 > /tmp/govuln.txt; VULN_EXIT=$?
          cat /tmp/govuln.txt

          [ "${VULN_EXIT}" -eq 0 ] && exit 0

          # Count total vulnerabilities vs stdlib-only vulnerabilities.
          # Third-party module vulnerabilities always fail. Stdlib-only vulnerabilities
          # warn and pass — the fix may require a Go toolchain version not yet released.
          VULN_COUNT=$(grep -c "^Vulnerability" /tmp/govuln.txt || true)
          STDLIB_COUNT=$(grep -c "Standard library" /tmp/govuln.txt || true)

          if [ "${VULN_COUNT}" -gt 0 ] && [ "${STDLIB_COUNT}" -ge "${VULN_COUNT}" ]; then
            echo "::warning::${VULN_COUNT} Go stdlib vulnerability(s) found — no fix available in current toolchain. Upgrade the Go toolchain when a patched version is released."
            exit 0
          fi

          echo "::error::Third-party module vulnerabilities found."
          exit "${VULN_EXIT}"

  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run Trivy (filesystem)
        id: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
