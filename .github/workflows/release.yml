name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38  # v4
        with:
          release-type: go

  container:
    name: Build & Push Container
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ghcr.io/thereisnotime/warpgate-operator:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/thereisnotime/warpgate-operator:latest

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/thereisnotime/warpgate-operator:${{ needs.release-please.outputs.tag_name }}
          artifact-name: warpgate-operator-${{ needs.release-please.outputs.tag_name }}-sbom.spdx.json
          upload-release-assets: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-name: ghcr.io/thereisnotime/warpgate-operator
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  helm:
    name: Package & Push Helm Chart
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          helm package charts/warpgate-operator \
            --version "${{ needs.release-please.outputs.version }}" \
            --app-version "${{ needs.release-please.outputs.version }}"

      - name: Push Helm chart to OCI registry
        run: helm push warpgate-operator-${{ needs.release-please.outputs.version }}.tgz oci://ghcr.io/thereisnotime/charts

  installer:
    name: Generate Install Manifest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Install just
        uses: taiki-e/install-action@95a61fa68a926d027cdc08016c7303a6ce8d1f87  # just

      - name: Build install manifest
        run: IMG=ghcr.io/thereisnotime/warpgate-operator:${{ needs.release-please.outputs.tag_name }} just build-installer

      - name: Upload install.yaml as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/install.yaml --clobber
