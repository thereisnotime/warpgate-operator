name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      # Operator package (root)
      operator_release_created: ${{ steps.release.outputs.release_created }}
      operator_version: ${{ steps.release.outputs.version }}
      operator_tag_name: ${{ steps.release.outputs.tag_name }}
      # Helm chart package
      chart_release_created: ${{ steps.release.outputs['charts/warpgate-operator--release_created'] }}
      chart_version: ${{ steps.release.outputs['charts/warpgate-operator--version'] }}
      chart_tag_name: ${{ steps.release.outputs['charts/warpgate-operator--tag_name'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38  # v4

  container:
    name: Build & Push Container
    needs: release-please
    if: needs.release-please.outputs.operator_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ghcr.io/thereisnotime/warpgate-operator:${{ needs.release-please.outputs.operator_tag_name }}
            ghcr.io/thereisnotime/warpgate-operator:${{ needs.release-please.outputs.operator_version }}
            ghcr.io/thereisnotime/warpgate-operator:latest

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/thereisnotime/warpgate-operator:${{ needs.release-please.outputs.operator_tag_name }}
          artifact-name: warpgate-operator-${{ needs.release-please.outputs.operator_tag_name }}-sbom.spdx.json
          upload-release-assets: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-name: ghcr.io/thereisnotime/warpgate-operator
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  installer:
    name: Generate Install Manifest
    needs: release-please
    if: needs.release-please.outputs.operator_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Install just
        uses: taiki-e/install-action@95a61fa68a926d027cdc08016c7303a6ce8d1f87  # just

      - name: Build install manifest
        run: IMG=ghcr.io/thereisnotime/warpgate-operator:${{ needs.release-please.outputs.operator_tag_name }} just build-installer

      - name: Upload install.yaml as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.operator_tag_name }}" dist/install.yaml --clobber

  helm:
    name: Package & Push Helm Chart
    needs: release-please
    # Run on chart release OR operator release (appVersion changes with operator)
    if: needs.release-please.outputs.chart_release_created == 'true' || needs.release-please.outputs.operator_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5
        with:
          version: v3.20.2

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          # chart_version is only set when the chart package itself releases.
          # For operator-only releases the chart version stays the same — read it from the manifest.
          CHART_VERSION="${{ needs.release-please.outputs.chart_version }}"
          if [ -z "${CHART_VERSION}" ]; then
            CHART_VERSION=$(jq -r '."charts/warpgate-operator"' .release-please-manifest.json)
          fi
          # operator_version is only set when the operator package releases.
          # For chart-only releases read the current operator version from the manifest.
          OPERATOR_VERSION="${{ needs.release-please.outputs.operator_version }}"
          if [ -z "${OPERATOR_VERSION}" ]; then
            OPERATOR_VERSION=$(jq -r '."."' .release-please-manifest.json)
          fi
          helm package charts/warpgate-operator \
            --version "${CHART_VERSION}" \
            --app-version "${OPERATOR_VERSION}"
          echo "CHART_VERSION=${CHART_VERSION}" >> $GITHUB_ENV

      - name: Push Helm chart to OCI registry
        run: helm push warpgate-operator-${{ env.CHART_VERSION }}.tgz oci://ghcr.io/thereisnotime/charts

      - name: Install oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0

      - name: Push artifacthub-repo.yml to OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
          oras push ghcr.io/thereisnotime/charts/artifacthub-repo:latest \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
