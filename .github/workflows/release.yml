name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: go

  container:
    name: Build & Push Container
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ghcr.io/thereisnotime/warpgate-operator:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/thereisnotime/warpgate-operator:latest

  helm:
    name: Package & Push Helm Chart
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          helm package charts/warpgate-operator \
            --version "${{ needs.release-please.outputs.version }}" \
            --app-version "${{ needs.release-please.outputs.version }}"

      - name: Push Helm chart to OCI registry
        run: helm push warpgate-operator-${{ needs.release-please.outputs.version }}.tgz oci://ghcr.io/thereisnotime/charts

  installer:
    name: Generate Install Manifest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Build install manifest
        run: just build-installer IMG=ghcr.io/thereisnotime/warpgate-operator:${{ needs.release-please.outputs.tag_name }}

      - name: Upload install.yaml as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/install.yaml --clobber
