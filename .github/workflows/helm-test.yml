name: Helm Chart Test

on:
  push:
    paths:
      - "charts/**"
      - "config/crd/**"
      - ".github/workflows/helm-test.yml"
  pull_request:
    paths:
      - "charts/**"
      - "config/crd/**"
      - ".github/workflows/helm-test.yml"
  workflow_dispatch: {}

concurrency:
  group: helm-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5
        with:
          version: v3.20.2

      - name: Lint chart
        run: helm lint charts/warpgate-operator

  template-validate:
    name: Template & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5
        with:
          version: v3.20.2

      - name: Template chart
        run: helm template warpgate-operator charts/warpgate-operator > /tmp/rendered.yaml

      - name: Install kubeconform
        uses: taiki-e/install-action@95a61fa68a926d027cdc08016c7303a6ce8d1f87  # just
        with:
          tool: kubeconform

      - name: Validate with kubeconform
        run: kubeconform -strict -ignore-missing-schemas -summary /tmp/rendered.yaml

  install-test:
    name: Install Test (kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5
        with:
          version: v3.20.2

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f  # v2.8.0

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1

      - name: Install and test chart
        run: ct install --charts charts/warpgate-operator
