name: Helm Chart Test

on:
  push:
    paths:
      - "charts/**"
      - "config/crd/**"
  pull_request:
    paths:
      - "charts/**"
      - "config/crd/**"

concurrency:
  group: helm-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint charts/warpgate-operator

  template-validate:
    name: Template & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Template chart
        run: helm template warpgate-operator charts/warpgate-operator > /tmp/rendered.yaml

      - name: Validate with dry-run
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          # --validate=false since there's no cluster to fetch the OpenAPI schema from
          kubectl apply --dry-run=client --validate=false -f /tmp/rendered.yaml

  install-test:
    name: Install Test (kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Install and test chart
        run: ct install --charts charts/warpgate-operator
