name: Helm Chart Test

on:
  push:
    paths:
      - "charts/**"
      - "config/crd/**"
      - ".github/workflows/helm-test.yml"
  pull_request:
    paths:
      - "charts/**"
      - "config/crd/**"
      - ".github/workflows/helm-test.yml"
  workflow_dispatch: {}

concurrency:
  group: helm-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5
        with:
          version: v3.20.2

      - name: Lint chart
        run: helm lint charts/warpgate-operator

  template-validate:
    name: Template & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5
        with:
          version: v3.20.2

      - name: Template chart
        run: helm template warpgate-operator charts/warpgate-operator > /tmp/rendered.yaml

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz \
            -o kubeconform.tar.gz
          echo "c31518ddd122663b3f3aa874cfe8178cb0988de944f29c74a0b9260920d115d3  kubeconform.tar.gz" | sha256sum -c
          tar xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate with kubeconform
        run: kubeconform -strict -ignore-missing-schemas -summary /tmp/rendered.yaml

  install-test:
    name: Install Test (kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5
        with:
          version: v3.20.2

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f  # v2.8.0

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.yaml
          kubectl wait --for=condition=Available deployment --all -n cert-manager --timeout=120s

      - name: Install and test chart
        run: ct install --charts charts/warpgate-operator
