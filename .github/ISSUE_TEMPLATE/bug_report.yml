name: Bug Report
description: Report a bug in warpgate-operator
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Apply this CR...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: input
    id: operator-version
    attributes:
      label: Operator Version
      description: Version or commit SHA of warpgate-operator.
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      description: Output of `kubectl version --short`.
      placeholder: "v1.30.0"
    validations:
      required: true

  - type: input
    id: warpgate-version
    attributes:
      label: Warpgate Version
      description: Version of the Warpgate instance the operator connects to.
      placeholder: "v0.11.0"
    validations:
      required: true
