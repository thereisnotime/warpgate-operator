# This rule is not used by the project warpgate-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to warpgate.warpgate.warp.tech resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: warpgate-operator
    app.kubernetes.io/managed-by: kustomize
  name: warpgateconnection-viewer-role
rules:
- apiGroups:
  - warpgate.warpgate.warp.tech
  resources:
  - warpgateconnections
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - warpgate.warpgate.warp.tech
  resources:
  - warpgateconnections/status
  verbs:
  - get
