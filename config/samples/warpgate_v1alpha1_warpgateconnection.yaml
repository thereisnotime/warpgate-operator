apiVersion: warpgate.warpgate.warp.tech/v1alpha1
kind: WarpgateConnection
metadata:
  labels:
    app.kubernetes.io/name: warpgate-operator
    app.kubernetes.io/managed-by: kustomize
  name: warpgateconnection-sample
spec:
  host: https://warpgate.example.com
  authSecretRef:
    name: warpgate-auth
    # tokenKey: token      # default — used for bearer auth
    # usernameKey: username # default — fallback session auth
    # passwordKey: password # default — fallback session auth
  insecureSkipVerify: false
